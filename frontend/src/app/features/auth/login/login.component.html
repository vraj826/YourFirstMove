<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 animate-fade-in" style="background: var(--color-background);">
  <div class="max-w-md w-full space-y-8">
    <!-- Header -->
    <div class="text-center animate-slide-up">
      <h1 class="text-gradient font-bold mb-2">YourFirstMove</h1>
      <p style="color: var(--color-text-secondary);">Sign in to your account</p>
    </div>
    
    <!-- Login Card with Glassmorphism -->
    <div class="glass-strong card animate-scale-in" style="padding: 2rem;">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email Input -->
        <div>
          <label class="block text-sm font-medium mb-2" style="color: var(--color-text-primary);">
            Email Address
          </label>
          <input 
            type="email" 
            formControlName="email" 
            placeholder="you@example.com"
            class="input"
          />
          <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')" 
             class="text-xs mt-1" 
             style="color: var(--color-error);">
            Email is required
          </p>
          <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')" 
             class="text-xs mt-1" 
             style="color: var(--color-error);">
            Please enter a valid email
          </p>
        </div>

        <!-- Password Input -->
        <div>
          <label class="block text-sm font-medium mb-2" style="color: var(--color-text-primary);">
            Password
          </label>
          <div class="relative">
            <input 
              [type]="hidePassword ? 'password' : 'text'" 
              formControlName="password"
              placeholder="Enter your password"
              class="input"
            />
            <button 
              type="button"
              (click)="hidePassword = !hidePassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
            >
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
          </div>
          <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')" 
             class="text-xs mt-1" 
             style="color: var(--color-error);">
            Password is required
          </p>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="btn btn-primary w-full btn-lg"
          [disabled]="loading || !loginForm.valid"
        >
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading" class="flex items-center gap-2">
            <span class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></span>
            Signing in...
          </span>
        </button>

        <!-- Register Link -->
        <div class="text-center pt-4">
          <a routerLink="/register" class="text-sm hover:underline" style="color: var(--color-primary);">
            Don't have an account? <span class="font-semibold">Register</span>
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
